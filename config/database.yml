default: &default
  adapter: postgresql
  encoding: unicode
  username: postgres
  password: postgres
  host: <%= ENV.fetch("DB_HOST", "127.0.0.1") %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>
  pool: 5

development:
  <<: *default
  database: assest_development

test:
  <<: *default
  database: assest_test

production:
  <<: *default
  database: assest_production
